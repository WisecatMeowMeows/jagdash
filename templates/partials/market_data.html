<!--
    partials/market_data.html
    Variables: ui.symbol, ui.interval, ui.period, ui.source
    source_options: list of {value, label, note} dicts passed from get_ui_context()
-->

<div class="plugin-panel" id="panel-market-data">

    <div class="plugin-header">
        <h2>Market Data</h2>
        <p class="plugin-subtitle">Fetch price history from multiple sources</p>
    </div>

    <form class="plugin-controls"
          hx-post="/plugin/market_data/fetch"
          hx-target="#market-results"
          hx-swap="innerHTML"
          hx-indicator="#market-loading">

        <div class="controls-row">

            <!-- Source selector -->
            <div class="control-group">
                <label for="md-source">Data Source</label>
                <select id="md-source" name="source" class="select-input"
                        onchange="updateSourceNote(this)">
                    {% for src in source_options %}
                    <option value="{{ src.value }}"
                        {% if src.value == ui.source %}selected{% endif %}>
                        {{ src.label }}
                    </option>
                    {% endfor %}
                </select>
                <!--
                    Source note — updates dynamically when source changes.
                    Shows usage hints without requiring a server round-trip.
                -->
                <p id="source-note" class="source-note">
                    {% for src in source_options %}
                    {% if src.value == ui.source %}{{ src.note }}{% endif %}
                    {% endfor %}
                </p>
            </div>

            <div class="control-group">
                <label for="md-symbol">Symbol</label>
                <input type="text"
                       id="md-symbol"
                       name="symbol"
                       value="{{ ui.symbol }}"
                       placeholder="e.g. BTC-USD, BTC, AAPL"
                       class="text-input">
            </div>

            <div class="control-group">
                <label for="md-interval">Interval</label>
                <select id="md-interval" name="interval" class="select-input">
                    {% set intervals = ["1m","2m","5m","15m","30m","1h","1d","1wk","1mo"] %}
                    {% for opt in intervals %}
                    <option value="{{ opt }}" {% if opt == ui.interval %}selected{% endif %}>
                        {{ opt }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Range mode toggle -->
            <div class="control-group">
                <label>Lookback Mode</label>
                <div class="toggle-row">
                    <label class="toggle-option">
                        <input type="radio" name="range_mode" value="period"
                               {% if ui.range_mode != "dates" %}checked{% endif %}
                               onchange="document.getElementById('period-controls').style.display='flex';
                                         document.getElementById('date-controls').style.display='none';">
                        Period
                    </label>
                    <label class="toggle-option">
                        <input type="radio" name="range_mode" value="dates"
                               {% if ui.range_mode == "dates" %}checked{% endif %}
                               onchange="document.getElementById('period-controls').style.display='none';
                                         document.getElementById('date-controls').style.display='flex';">
                        Date Range
                    </label>
                </div>
            </div>

            <!-- Period controls -->
            <div class="control-group" id="period-controls"
                 style="display: {% if ui.range_mode == 'dates' %}none{% else %}flex{% endif %}; flex-direction: column; gap: var(--space-xs);">
                <label for="md-period">Period</label>
                <select id="md-period" name="period" class="select-input">
                    {% set periods = ["6h","12h","1d","3d","5d","1mo","3mo","6mo","1y","2y","5y","max"] %}
                    {% for opt in periods %}
                    <option value="{{ opt }}" {% if opt == ui.period %}selected{% endif %}>{{ opt }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date range controls -->
            <div class="control-group" id="date-controls"
                 style="display: {% if ui.range_mode == 'dates' %}flex{% else %}none{% endif %}; flex-direction: row; gap: var(--space-sm); flex-wrap: wrap;">
                <div style="display:flex; flex-direction:column; gap: var(--space-xs);">
                    <label for="md-start">Start Date</label>
                    <input type="date" id="md-start" name="start"
                           value="{{ ui.start }}" class="text-input">
                </div>
                <div style="display:flex; flex-direction:column; gap: var(--space-xs);">
                    <label for="md-end">End Date</label>
                    <input type="date" id="md-end" name="end"
                           value="{{ ui.end }}" class="text-input">
                </div>
            </div>

            <div class="control-group control-group--btn">
                <label>&nbsp;</label>
                <button type="submit" class="btn btn--primary">Fetch Data</button>
            </div>

        </div>

    </form>

    <div id="market-loading" class="htmx-indicator loading-inline">
        Loading market data…
    </div>

    <div id="market-results" class="results-area">
        <p class="placeholder-msg">Results will appear here after fetching.</p>
    </div>

</div>

<script>
    // Source note lookup — keyed by source value, populated from server data.
    // Avoids a server round-trip just to update a hint text.
    var sourceNotes = {
        {% for src in source_options %}
        "{{ src.value }}": "{{ src.note }}",
        {% endfor %}
    };

    function updateSourceNote(select) {
        var note = sourceNotes[select.value] || "";
        document.getElementById("source-note").textContent = note;
    }
</script>
