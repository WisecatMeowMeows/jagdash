# strategies/macd_zero_line.yaml
#
# MACD Zero Line Cross
# --------------------
# Source: Gerald Appel, developer of MACD (Moving Average Convergence/Divergence)
# See also: Investopedia — "MACD: A Primer"
#
# MACD is the difference between a fast EMA and a slow EMA.
# When this difference is positive, the fast EMA is above the slow EMA —
# meaning short-term momentum is stronger than long-term momentum: bullish.
# When negative, the reverse: bearish.
#
# HOW IT DIFFERS FROM THE BUILT-IN "MACD Trend":
#   Built-in "MACD Trend": compares the MACD line to its own 9-period signal line.
#   This is a fast, hair-trigger signal — the signal line tracks MACD closely,
#   so crossovers happen frequently.
#
#   This strategy: compares MACD to zero.
#   Zero is an absolute level — it only crosses when the underlying EMAs actually
#   cross each other. This is slower and less frequent than the signal-line cross,
#   but also less noisy. Think of it as a coarser filter that only fires on
#   confirmed trend changes rather than momentum wobbles.
#
# IN PRACTICE:
#   MACD zero line cross often lags the signal-line cross by several bars.
#   Running both together in the combined signal is intentional — they'll agree
#   on strong trend moves and disagree on weak ones, and the confidence score
#   will reflect that.
#
# WHEN TO WEIGHT THIS HIGHER:
#   Trending markets, longer timeframes, when you want fewer but higher-conviction
#   trend-change signals.
#
# WHEN TO WEIGHT THIS LOWER (or disable):
#   Choppy sideways markets — zero line crosses become noise.

name: "MACD Zero Line"
type: "Momentum / Trend confirmation"
min_candles: 35

description: >
  Compares the MACD line to zero rather than to its signal line (as the built-in
  MACD Trend does). The MACD line crosses zero only when the fast and slow EMAs
  actually cross — a slower, less frequent, lower-noise signal than the
  signal-line crossover. Positive MACD (fast EMA above slow EMA) = BUY;
  negative = SELL. Best used alongside the built-in MACD Trend: they'll agree
  on strong moves and disagree on weak ones, and the confidence score will
  reflect the difference. Based on Gerald Appel's original MACD methodology.

indicators:
  macd: { type: macd, fast: 12, slow: 26 }

rules:
  # MACD above zero: fast EMA has crossed above slow EMA — trend shifting bullish
  - signal: BUY
    when: [macd, ">", 0]

  # MACD below zero: fast EMA has crossed below slow EMA — trend shifting bearish
  - signal: SELL
    when: [macd, "<", 0]

  # MACD exactly at zero — effectively impossible in practice, but safe fallback
  - signal: HOLD
    default: true
