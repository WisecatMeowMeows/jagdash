# strategies/golden_death_cross.yaml
#
# Golden Cross / Death Cross
# --------------------------
# Source: One of the most widely documented signals in technical analysis.
# See: Investopedia — "Golden Cross" and "Death Cross"
#
# The Golden Cross: the 50-period SMA crosses above the 200-period SMA.
# Interpreted as a long-term shift from bearish to bullish trend.
# Institutional traders and major financial media treat it as a significant event.
#
# The Death Cross is the inverse: 50-period SMA drops below 200-period SMA,
# signaling a potential long-term downtrend.
#
# DATA REQUIREMENT: 200+ candles needed for SMA(200) to have a valid value.
# With fewer candles, SMA(200) returns NaN, conditions fail, and this strategy
# returns HOLD — which is the correct and safe behavior. It will automatically
# become active once your market.price plugin returns enough history.
#
# IMPORTANT: This is a slow, major-trend indicator. Expect it to disagree
# with faster strategies (RSI, MACD) frequently — that is normal.
# It works best as a background filter, given high weight in a trend-following
# context and low weight in a short-term trading context.

name: "Golden/Death Cross"
type: "Long-term trend-following"
min_candles: 210

description: >
  The Golden Cross (SMA 50 crossing above SMA 200) is one of the most widely
  watched signals in technical analysis, treated by institutional and retail traders
  alike as confirmation of a major long-term trend shift to bullish.
  The Death Cross (SMA 50 below SMA 200) signals the opposite.
  This is a slow-moving signal — it will lag major reversals and frequently disagree
  with faster indicators. That is by design. Best used as a high-weight background
  filter in trend-following configurations. Requires 200+ candles to produce a signal;
  returns HOLD safely when data is insufficient.

indicators:
  sma_50:  { type: sma, period: 50  }
  sma_200: { type: sma, period: 200 }

rules:
  # Golden Cross: short-term average above long-term → bullish trend confirmed
  - signal: BUY
    when: [sma_50, ">", sma_200]

  # Death Cross: short-term average below long-term → bearish trend confirmed
  - signal: SELL
    when: [sma_50, "<", sma_200]

  # Equal (extremely rare) or insufficient data → neutral
  - signal: HOLD
    default: true
