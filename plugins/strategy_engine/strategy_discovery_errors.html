<!--
    partials/strategy_discovery_errors.html
    Extracted from strategy_engine.html so /reload can refresh this
    block via hx-swap-oob (the strategy file set may have changed).

    Variables:
        errors — dict of {filename: error_message} from strategy discovery
-->
{% if errors %}
<div class="discovery-errors">
    {% for filename, msg in errors.items() %}
    <div class="{% if msg.startswith('Note:') %}info-msg{% else %}error-msg{% endif %}">
        <strong>{{ filename }}</strong>: {{ msg }}
    </div>
    {% endfor %}
</div>
{% endif %}
