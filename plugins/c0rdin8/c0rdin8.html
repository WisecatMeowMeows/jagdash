<div class="plugin-panel" id="panel-c0rdin8">

    <div class="plugin-header">
        <h2>c0rdin8</h2>
        <p class="plugin-subtitle">
            Coordinated trade recommendation feeds
        </p>
    </div>

    <form
        class="plugin-controls"
        hx-post="/plugin/c0rdin8/fetch"
        hx-target="#c0rdin8-results"
        hx-swap="innerHTML">

        <div class="controls-row">

            <div class="control-group">
                <label>Feed URL</label>
                <input
                    type="text"
                    name="feed_url"
                    value="{{ ui.feed_url }}"
                    class="text-input">
            </div>

            <div class="control-group control-group--btn">
                <label>&nbsp;</label>
                <button type="submit" class="btn btn--primary">
                    Fetch Feed
                </button>
                <button
                    hx-post="/plugin/c0rdin8/fetch_all"
                    hx-target="#c0rdin8-results">
                    Fetch All
                </button>
            </div>

        </div>

    </form>

    <div id="c0rdin8-results" class="results-area">
        <p class="placeholder-msg">
            Feed results will appear here.
        </p>
    </div>

</div>
