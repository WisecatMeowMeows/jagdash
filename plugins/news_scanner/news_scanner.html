<!--
    partials/news_scanner.html
    Searches NewsAPI for articles matching a query.

    Variables passed from main.py:
        watchlist   — list of default topic strings
-->

<div class="plugin-panel" id="panel-news-scanner">

    <div class="plugin-header">
        <h2>News Scanner</h2>
        <p class="plugin-subtitle">Search recent news articles via NewsAPI</p>
    </div>

    <form class="plugin-controls"
          hx-post="/plugin/news_scanner/fetch"
          hx-target="#news-scanner-results"
          hx-swap="innerHTML"
          hx-indicator="#news-scanner-loading">

        <div class="controls-row">

            <div class="control-group">
                <label for="news-watchlist">Watchlist</label>
                <select id="news-watchlist" name="watchlist_item" class="select-input"
                        onchange="
                            var custom = document.getElementById('news-custom-query');
                            if (this.value) custom.value = '';
                        ">
                    {% for item in watchlist %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="control-group">
                <label for="news-custom-query">Custom Query (overrides watchlist)</label>
                <input type="text"
                       id="news-custom-query"
                       name="custom_query"
                       placeholder="e.g. Bitcoin ETF, Fed rate decision"
                       class="text-input">
            </div>

            <div class="control-group control-group--btn">
                <label>&nbsp;</label>
                <button type="submit" class="btn btn--primary">Scan News</button>
            </div>

        </div>

    </form>

    <div id="news-scanner-loading" class="htmx-indicator loading-inline">
        Scanning news…
    </div>

    <div id="news-scanner-results" class="results-area">
        <p class="placeholder-msg">Results will appear here after scanning.</p>
    </div>

</div>
